name: Update US Cloudflare IPs

on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "Manual debug run for CloudflareSpeedTest"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 */6 * * *"

concurrency:
  group: update-us-cf-ips
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CFST_VERSION: v2.3.4
  CFST_URL: https://speed.cloudflare.com/__down?bytes=99999999
  FAILCOUNT_FILE: .github/state/update-us-cf-ips.failcount
  MAX_CONSECUTIVE_FAILURES: "3"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read failure fuse
        id: fuse
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "$FAILCOUNT_FILE")"
          if [ ! -f "$FAILCOUNT_FILE" ]; then
            echo 0 > "$FAILCOUNT_FILE"
          fi

          count="$(tr -d '[:space:]' < "$FAILCOUNT_FILE")"
          if ! [[ "$count" =~ ^[0-9]+$ ]]; then
            count=0
          fi

          echo "count=$count" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "schedule" ] && [ "$count" -ge "$MAX_CONSECUTIVE_FAILURES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled runs paused after $count consecutive failures. Use workflow_dispatch after fixing the config."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop scheduled runs after repeated failures
        if: ${{ steps.fuse.outputs.skip == 'true' }}
        run: |
          echo "Skipping scheduled run because the consecutive failure threshold was reached."
          exit 0

      - name: Download CloudflareSpeedTest
        if: ${{ steps.fuse.outputs.skip != 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          curl -fL --retry 3 --retry-delay 2 \
            -o cfst.tar.gz \
            "https://github.com/XIU2/CloudflareSpeedTest/releases/download/${CFST_VERSION}/cfst_linux_amd64.tar.gz"

          tar -zxf cfst.tar.gz
          chmod +x cfst

      - name: Run CloudflareSpeedTest for US POPs
        if: ${{ steps.fuse.outputs.skip != 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          RESULT_CSV="${GITHUB_WORKSPACE}/result.csv"
          rm -f "$RESULT_CSV"

          CFST_ARGS=(
            -httping
            -httping-code 200
            -url "${CFST_URL}"
            -cfcolo LAX,SJC,SEA,LAS,PHX,DEN,DFW,ORD,ATL,IAD,EWR,JFK,BOS,MIA
            -n 20
            -t 4
            -tp 443
            -tl 250
            -tlr 0.2
            -dn 20
            -dt 5
            -sl 0.5
            -p 0
            -o "$RESULT_CSV"
          )

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.debug_mode }}" = "true" ]; then
            CFST_ARGS+=( -debug )
          fi

          ./cfst "${CFST_ARGS[@]}"

          if [ ! -s "$RESULT_CSV" ]; then
            echo "CloudflareSpeedTest did not generate a non-empty result.csv" >&2
            exit 1
          fi

          echo "Preview result.csv:"
          head -n 20 "$RESULT_CSV"

      - name: Build us.txt for cfnew
        if: ${{ steps.fuse.outputs.skip != 'true' }}
        shell: bash
        run: |
          python - <<'PY'
          import csv
          import pathlib
          import sys

          result_csv = pathlib.Path("result.csv")
          if not result_csv.is_file():
              print("result.csv not found", file=sys.stderr)
              sys.exit(1)

          allowed = {
              "LAX", "SJC", "SEA", "LAS", "PHX", "DEN",
              "DFW", "ORD", "ATL", "IAD", "EWR", "JFK",
              "BOS", "MIA"
          }

          def first_nonempty(row, keys):
              for key in keys:
                  value = (row.get(key) or "").strip()
                  if value:
                      return value
              return ""

          rows = []
          seen = set()

          with result_csv.open(encoding="utf-8-sig", newline="") as f:
              reader = csv.DictReader(f)
              for row in reader:
                  ip = first_nonempty(row, ["IP 地址", "IP地址", "IP"])
                  colo = first_nonempty(row, ["地区码"]).upper()
                  speed_text = first_nonempty(row, ["下载速度(MB/s)", "下载速度"])

                  if not ip or not colo or colo not in allowed:
                      continue

                  try:
                      speed = float(speed_text)
                  except ValueError:
                      continue

                  if speed < 0.5:
                      continue

                  if ip in seen:
                      continue

                  seen.add(ip)
                  rows.append((ip, colo, speed))

          if len(rows) < 5:
              print(f"Too few usable US IPs: {len(rows)}", file=sys.stderr)
              sys.exit(1)

          out = pathlib.Path("us.txt")
          out.write_text(
              "\n".join(
                  f"{ip}:443#US-{colo}-{i:02d}"
                  for i, (ip, colo, _speed) in enumerate(rows[:20], 1)
              ) + "\n",
              encoding="utf-8"
          )

          meta = pathlib.Path("us-meta.txt")
          meta.write_text(
              "\n".join([
                  f"count={min(len(rows), 20)}",
                  f"sample={','.join(colo for _, colo, _ in rows[:10])}"
              ]) + "\n",
              encoding="utf-8"
          )
          PY

      - name: Commit success state and push
        if: ${{ success() && steps.fuse.outputs.skip != 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "$FAILCOUNT_FILE")"
          echo 0 > "$FAILCOUNT_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add us.txt us-meta.txt "$FAILCOUNT_FILE"

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "update us.txt"
          git push

      - name: Record failure count
        if: ${{ failure() && steps.fuse.outputs.skip != 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "$FAILCOUNT_FILE")"

          current=0
          if [ -f "$FAILCOUNT_FILE" ]; then
            current="$(tr -d '[:space:]' < "$FAILCOUNT_FILE")"
          fi
          if ! [[ "$current" =~ ^[0-9]+$ ]]; then
            current=0
          fi

          max="$MAX_CONSECUTIVE_FAILURES"
          if [ "$current" -lt "$max" ]; then
            current=$((current + 1))
          fi
          echo "$current" > "$FAILCOUNT_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FAILCOUNT_FILE"

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "chore: update CFST failure count to $current"
          git push
