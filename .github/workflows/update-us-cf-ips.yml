name: Update US Cloudflare IPs

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 1,8,15,22 * *"

permissions:
  contents: write

concurrency:
  group: cf-us-pool-update
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CFST_VERSION: "2.3.4"
  TARGET_COUNT: "200"
  TOP_COUNT: "20"
  SHARD_COUNT: "4"
  SHARD_KEEP: "120"
  MIN_FINAL_IPS: "30"
  CFST_THREADS: "8"
  CFST_TRIES: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download CloudflareSpeedTest
        shell: bash
        run: |
          set -euo pipefail
          curl -L -o cfst.tar.gz \
            "https://github.com/XIU2/CloudflareSpeedTest/releases/download/v${CFST_VERSION}/cfst_linux_amd64.tar.gz"
          tar -zxf cfst.tar.gz
          chmod +x cfst

      - name: Prepare shard for this scheduled run
        id: shard
        shell: bash
        run: |
          set -euo pipefail

          day="$(date -u +%d | sed 's/^0//')"
          if [ "$day" -ge 22 ]; then
            shard=3
          elif [ "$day" -ge 15 ]; then
            shard=2
          elif [ "$day" -ge 8 ]; then
            shard=1
          else
            shard=0
          fi

          mkdir -p data tmp

          awk -v shard="$shard" -v total="$SHARD_COUNT" '
            NF > 0 && $0 !~ /^#/ {
              if ((count % total) == shard) print
              count++
            }
          ' ip.txt > tmp/ip-shard.txt

          lines="$(wc -l < tmp/ip-shard.txt | tr -d ' ')"
          if [ "$lines" -eq 0 ]; then
            echo "tmp/ip-shard.txt is empty" >&2
            exit 1
          fi

          echo "shard=$shard" >> "$GITHUB_OUTPUT"
          echo "lines=$lines" >> "$GITHUB_OUTPUT"
          echo "Using shard: $shard"
          echo "Shard input lines: $lines"

      - name: Run CloudflareSpeedTest for this US shard
        timeout-minutes: 12
        shell: bash
        run: |
          set -euo pipefail
          ./cfst \
            -httping \
            -dd \
            -cfcolo LAX,SJC,SEA,LAS,PHX,DEN,DFW,ORD,ATL,IAD,EWR,JFK,BOS,MIA \
            -f tmp/ip-shard.txt \
            -n "$CFST_THREADS" \
            -t "$CFST_TRIES" \
            -tp 443 \
            -p 0 \
            -o tmp/result.csv

      - name: Build merged pool and top20 subscription file
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import datetime as dt
          import ipaddress
          import os
          from pathlib import Path

          target_count = int(os.environ["TARGET_COUNT"])
          top_count = int(os.environ["TOP_COUNT"])
          shard_keep = int(os.environ["SHARD_KEEP"])
          min_final_ips = int(os.environ["MIN_FINAL_IPS"])
          shard = int("${{ steps.shard.outputs.shard }}")

          allowed_colos = {
              "LAX", "SJC", "SEA", "LAS", "PHX", "DEN", "DFW",
              "ORD", "ATL", "IAD", "EWR", "JFK", "BOS", "MIA"
          }

          colo_city_map = {
              "LAX": "洛杉矶",
              "SJC": "圣何塞",
              "SEA": "西雅图",
              "LAS": "拉斯维加斯",
              "PHX": "菲尼克斯",
              "DEN": "丹佛",
              "DFW": "达拉斯",
              "ORD": "芝加哥",
              "ATL": "亚特兰大",
              "IAD": "华盛顿",
              "EWR": "纽瓦克",
              "JFK": "纽约",
              "BOS": "波士顿",
              "MIA": "迈阿密",
          }

          result_path = Path("tmp/result.csv")
          if not result_path.exists() or result_path.stat().st_size == 0:
              raise SystemExit("tmp/result.csv not found or empty")

          data_dir = Path("data")
          data_dir.mkdir(exist_ok=True)

          def is_ip(value: str) -> bool:
              try:
                  ipaddress.ip_address(value.strip())
                  return True
              except ValueError:
                  return False

          def to_float(value: str, default: float) -> float:
              try:
                  return float(str(value).strip())
              except Exception:
                  return default

          fresh_rows = []
          with result_path.open("r", encoding="utf-8-sig", newline="") as f:
              reader = csv.reader(f)
              for row in reader:
                  if not row:
                      continue
                  ip = row[0].strip()
                  if not is_ip(ip):
                      continue
                  sent = to_float(row[1] if len(row) > 1 else "0", 0.0)
                  recv = to_float(row[2] if len(row) > 2 else "0", 0.0)
                  loss = to_float(row[3] if len(row) > 3 else "1", 1.0)
                  delay = to_float(row[4] if len(row) > 4 else "999999", 999999.0)
                  colo = (row[6] if len(row) > 6 else row[-1]).strip().upper()
                  if colo not in allowed_colos:
                      continue
                  fresh_rows.append((ip, sent, recv, loss, delay, colo))

          if not fresh_rows:
              raise SystemExit("fresh shard results empty after parsing")

          fresh_rows.sort(key=lambda x: (x[4], x[3], x[0]))

          updated_at = dt.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")

          shard_csv = data_dir / f"us-shard-{shard}.csv"
          with shard_csv.open("w", encoding="utf-8", newline="") as f:
              writer = csv.writer(f)
              writer.writerow(["ip", "sent", "recv", "loss", "delay_ms", "colo", "updated_at_utc"])
              for ip, sent, recv, loss, delay, colo in fresh_rows[:shard_keep]:
                  writer.writerow([ip, int(sent), int(recv), f"{loss:.2f}", f"{delay:.2f}", colo, updated_at])

          merged = []
          for p in sorted(data_dir.glob("us-shard-*.csv")):
              with p.open("r", encoding="utf-8", newline="") as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      ip = row.get("ip", "").strip()
                      if not is_ip(ip):
                          continue
                      colo = row.get("colo", "").strip().upper()
                      if colo not in allowed_colos:
                          continue
                      loss = to_float(row.get("loss", "1"), 1.0)
                      delay = to_float(row.get("delay_ms", "999999"), 999999.0)
                      merged.append((ip, loss, delay, colo))

          merged.sort(key=lambda x: (x[2], x[1], x[0]))

          seen = set()
          final_ips = []
          for ip, loss, delay, colo in merged:
              if ip in seen:
                  continue
              seen.add(ip)
              final_ips.append((ip, loss, delay, colo))
              if len(final_ips) >= target_count:
                  break

          if len(final_ips) < min_final_ips:
              raise SystemExit(f"merged final pool too small: {len(final_ips)} < {min_final_ips}")

          if len(final_ips) < top_count:
              raise SystemExit(f"not enough IPs for top subset: {len(final_ips)} < {top_count}")

          top_rows = final_ips[:top_count]

          # 完整池
          with Path("us.txt").open("w", encoding="utf-8", newline="") as f:
              for ip, _, _, _ in final_ips:
                  f.write(ip + "\n")

          # 关键修复：yxURL 远程文件必须一行一个节点，不能逗号拼成一整行
          with Path("top20-us-cfnew.txt").open("w", encoding="utf-8", newline="") as f:
              for idx, (ip, loss, delay, colo) in enumerate(top_rows, start=1):
                  city = colo_city_map.get(colo, colo)
                  name = f"🇺🇸_美国-{city}-{colo}-{idx:02d}-443-WS-TLS"
                  f.write(f"{ip}:443#{name}\n")

          with Path("us-meta.txt").open("w", encoding="utf-8", newline="") as f:
              f.write(f"updated_at_utc={updated_at}\n")
              f.write(f"shard={shard}\n")
              f.write(f"fresh_count={len(fresh_rows)}\n")
              f.write(f"final_count={len(final_ips)}\n")
              f.write(f"top_count={len(top_rows)}\n")

          print(f"fresh_count={len(fresh_rows)}")
          print(f"final_count={len(final_ips)}")
          print(f"top_count={len(top_rows)}")
          PY

      - name: Validate output files
        shell: bash
        run: |
          set -euo pipefail

          final_count="$(grep -c '.' us.txt || true)"
          top_cfnew_count="$(grep -c '.' top20-us-cfnew.txt || true)"

          echo "Final us.txt lines: $final_count"
          echo "Top cfnew lines: $top_cfnew_count"

          test "$final_count" -ge "$MIN_FINAL_IPS"
          test "$top_cfnew_count" -eq "$TOP_COUNT"

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add us.txt top20-us-cfnew.txt us-meta.txt data/us-shard-*.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh US Cloudflare IP pool and top20 subscription"
          git push
