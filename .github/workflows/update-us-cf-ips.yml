name: Update US Cloudflare IPs

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron 默认按 UTC 运行
    - cron: "17 3 1,8,15,22 * *"

permissions:
  contents: write

concurrency:
  group: cf-us-pool-update
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CFST_VERSION: "2.3.4"
  TARGET_COUNT: "200"
  SHARD_COUNT: "4"
  SHARD_KEEP: "80"
  MIN_FRESH_IPS: "30"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download CloudflareSpeedTest
        shell: bash
        run: |
          set -euo pipefail
          curl -L -o cfst.tar.gz \
            "https://github.com/XIU2/CloudflareSpeedTest/releases/download/v${CFST_VERSION}/cfst_linux_amd64.tar.gz"
          tar -zxf cfst.tar.gz
          chmod +x cfst

      - name: Prepare shard for this scheduled run
        id: shard
        shell: bash
        run: |
          set -euo pipefail

          day="$(date -u +%d | sed 's/^0//')"
          if [ "$day" -ge 22 ]; then
            shard=3
          elif [ "$day" -ge 15 ]; then
            shard=2
          elif [ "$day" -ge 8 ]; then
            shard=1
          else
            shard=0
          fi

          mkdir -p data tmp

          awk -v shard="$shard" -v total="$SHARD_COUNT" '
            NF > 0 && $0 !~ /^#/ {
              if ((count % total) == shard) print
              count++
            }
          ' ip.txt > tmp/ip-shard.txt

          lines="$(wc -l < tmp/ip-shard.txt | tr -d ' ')"
          echo "shard=$shard" >> "$GITHUB_OUTPUT"
          echo "lines=$lines" >> "$GITHUB_OUTPUT"

          echo "Using shard: $shard"
          echo "Shard candidate ranges: $lines"

      - name: Run CloudflareSpeedTest for this US shard
        timeout-minutes: 18
        shell: bash
        run: |
          set -euo pipefail
          ./cfst \
            -httping \
            -dd \
            -httping-code 200 \
            -url https://www.cloudflare.com/cdn-cgi/trace \
            -cfcolo LAX,SJC,SEA,LAS,PHX,DEN,DFW,ORD,ATL,IAD,EWR,JFK,BOS,MIA \
            -f tmp/ip-shard.txt \
            -n 24 \
            -t 2 \
            -tp 443 \
            -tl 250 \
            -tlr 0.2 \
            -p 0 \
            -o tmp/result.csv

      - name: Build fresh shard snapshot and merged us.txt
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import datetime as dt
          import ipaddress
          import os
          from pathlib import Path

          target_count = int(os.environ["TARGET_COUNT"])
          shard_keep = int(os.environ["SHARD_KEEP"])
          min_fresh_ips = int(os.environ["MIN_FRESH_IPS"])
          shard = int("${{ steps.shard.outputs.shard }}")

          result_path = Path("tmp/result.csv")
          if not result_path.exists() or result_path.stat().st_size == 0:
              raise SystemExit("tmp/result.csv not found or empty")

          data_dir = Path("data")
          data_dir.mkdir(exist_ok=True)

          def is_ip(value: str) -> bool:
              try:
                  ipaddress.ip_address(value.strip())
                  return True
              except ValueError:
                  return False

          def parse_delay(row):
              if len(row) >= 5:
                  try:
                      return float(row[4])
                  except Exception:
                      pass
              for cell in row[1:]:
                  try:
                      return float(cell)
                  except Exception:
                      continue
              return 999999.0

          fresh_rows = []
          with result_path.open("r", encoding="utf-8-sig", newline="") as f:
              reader = csv.reader(f)
              for row in reader:
                  if not row:
                      continue
                  ip = row[0].strip()
                  if not is_ip(ip):
                      continue
                  delay = parse_delay(row)
                  colo = row[-1].strip() if len(row) >= 2 else ""
                  fresh_rows.append((ip, delay, colo))

          if len(fresh_rows) < min_fresh_ips:
              raise SystemExit(f"fresh shard results too small: {len(fresh_rows)} < {min_fresh_ips}")

          shard_csv = data_dir / f"us-shard-{shard}.csv"
          with shard_csv.open("w", encoding="utf-8", newline="") as f:
              writer = csv.writer(f)
              writer.writerow(["ip", "delay_ms", "colo"])
              for ip, delay, colo in fresh_rows[:shard_keep]:
                  writer.writerow([ip, f"{delay:.2f}", colo])

          merged = []
          for p in sorted(data_dir.glob("us-shard-*.csv")):
              with p.open("r", encoding="utf-8", newline="") as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      ip = row.get("ip", "").strip()
                      if not is_ip(ip):
                          continue
                      try:
                          delay = float(row.get("delay_ms", "999999"))
                      except Exception:
                          delay = 999999.0
                      colo = row.get("colo", "").strip()
                      merged.append((ip, delay, colo))

          merged.sort(key=lambda x: (x[1], x[0]))

          seen = set()
          final_ips = []
          for ip, delay, colo in merged:
              if ip in seen:
                  continue
              seen.add(ip)
              final_ips.append((ip, delay, colo))
              if len(final_ips) >= target_count:
                  break

          if len(final_ips) < min_fresh_ips:
              raise SystemExit(f"merged final pool too small: {len(final_ips)} < {min_fresh_ips}")

          with Path("us.txt").open("w", encoding="utf-8", newline="") as f:
              for ip, _, _ in final_ips:
                  f.write(ip + "\\n")

          today = dt.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          with Path("us-meta.txt").open("w", encoding="utf-8", newline="") as f:
              f.write(f"updated_at_utc={today}\\n")
              f.write(f"shard={shard}\\n")
              f.write(f"fresh_count={len(fresh_rows)}\\n")
              f.write(f"final_count={len(final_ips)}\\n")

          print(f"fresh_count={len(fresh_rows)}")
          print(f"final_count={len(final_ips)}")
          PY

      - name: Fail when us.txt is too small
        shell: bash
        run: |
          set -euo pipefail
          count="$(grep -c '.' us.txt || true)"
          echo "Final us.txt lines: $count"
          test "$count" -ge "$MIN_FRESH_IPS"

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add us.txt us-meta.txt data/us-shard-*.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh US Cloudflare IP pool"
          git push
